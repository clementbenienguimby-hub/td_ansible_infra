---
- name: Configuration du routeur CSR1000
  hosts: csr1000
  gather_facts: no

  tasks:

    - name: Configuration IP des interfaces
      cisco.ios.ios_l3_interfaces:
        config:
          - name: GigabitEthernet1
            ipv4:
              - dhcp:
                  enable: true
          - name: GigabitEthernet2
            ipv4:
              - address: 192.168.2.1/24
          - name: GigabitEthernet3
            ipv4:
              - address: 192.168.3.1/24
          - name: GigabitEthernet4
            ipv4:
              - address: 192.168.4.1/24
        state: merged

    - name: Activation et description des interfaces
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: WAN
            enabled: true
          - name: GigabitEthernet2
            description: LAN_ENTREPRISE
            enabled: true
          - name: GigabitEthernet3
            description: LAN_DMZ
            enabled: true
          - name: GigabitEthernet4
            description: ADMIN
            enabled: true
        state: merged

    - name: Suppression du pool DHCP existant (évite les erreurs)
      cisco.ios.ios_config:
        lines:
          - no ip dhcp pool LAN_ENTREPRISE
      ignore_errors: yes

    - name: Configuration du serveur DHCP
      cisco.ios.ios_config:
        lines:
          - ip dhcp pool LAN_ENTREPRISE
          - network 192.168.2.0 255.255.255.0
          - default-router 192.168.2.1
          - dns-server 8.8.8.8
